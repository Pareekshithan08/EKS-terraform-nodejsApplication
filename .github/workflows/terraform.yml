name: Terraform Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Select the terraform action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy
      target:
        description: 'Specify the terraform target resource (optional)'
        required: false
        default: ''
        type: string
          

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init -reconfigure

      - name: Terraform Plan
        working-directory: ./terraform
        run: |
          if [ "${{ github.event.inputs.action }}" == "apply" ]; then
            terraform plan -out=tfplan
          elif [ "${{ github.event.inputs.action }}" == "destroy" ]; then
            terraform plan -destroy -out=tfplan
          fi

      - name: Terraform Apply / Destroy
        if: github.ref == 'refs/heads/main'
        working-directory: ./terraform
        run: |
          if [ "${{ github.event.inputs.action }}" == "destroy" ]; then
            if [ -n "${{ github.event.inputs.target }}" ]; then
              terraform apply -destroy -target=${{ github.event.inputs.target }} tfplan
            else
              terraform apply -destroy tfplan
            fi
          else
            if [ -n "${{ github.event.inputs.target }}" ]; then
              terraform apply -target=${{ github.event.inputs.target }} tfplan
            else
              terraform apply tfplan
            fi
          