name: Deploy to EKS

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region us-east-1 --name eks-dev-cluster

      - name: Inspect LB controller IAM policy
        run: |
          echo "Attached policy document:";
          aws iam get-role-policy \
            --role-name aws-load-balancer-controller \
            --policy-name AWSLoadBalancerControllerIAMPolicy \
            --region us-east-1 || true

      - name: Restart LB controller
        run: |
          kubectl rollout restart deployment/aws-load-balancer-controller -n kube-system || true
          kubectl rollout status deployment/aws-load-balancer-controller -n kube-system --timeout=2m || true

      - name: Diagnostics
        run: |
          echo "Cluster info:"; kubectl cluster-info || true
          echo "Nodes:"; kubectl get nodes --no-headers || true
          echo "Existing deployments:"; kubectl get deployments --all-namespaces || true

      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s/deployment.yml
          kubectl apply -f k8s/service.yml
          kubectl apply -f k8s/ingress.yml
          echo "Deployment applied successfully"

      - name: Show ingress events
        run: |
          kubectl describe ingress patient-service-ingress -n default || true


      - name: Verify Deployment
        run: |
          echo "Showing all resources before rollout:"; kubectl get all --all-namespaces || true
          echo "Waiting for deployment to be ready..."
          kubectl rollout status deployment/patient-service --timeout=2m || true
          echo "Pods deployed:"; kubectl get pods -o wide || true
          echo "Services:"; kubectl get svc -o wide || true
          echo "Events:"; kubectl get events --all-namespaces --sort-by=.metadata.creationTimestamp | tail -20 || true