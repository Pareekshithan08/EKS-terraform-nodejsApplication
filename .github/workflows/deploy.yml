name: Deploy to EKS

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Get ECR Repository URL
        working-directory: ./terraform
        run: |
          terraform init -reconfigure
          terraform output -raw ecr_repository_url > /tmp/ecr_url.txt
          echo "ECR_REPO_URL=$(cat /tmp/ecr_url.txt)" >> $GITHUB_ENV

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region us-east-1 --name eks-dev-cluster

      - name: Deploy to EKS
        run: |
          sed "s|<ECR_REPO_URL>|${ECR_REPO_URL}|g" k8s/deployment.yml | kubectl apply -f -
          kubectl apply -f k8s/service.yml
          kubectl apply -f k8s/ingress.yml
          echo "Deployment applied successfully"
          echo "ECR Image: ${ECR_REPO_URL}:latest"

      - name: Verify Deployment
        run: |
          echo "Waiting for deployment to be ready..."
          kubectl rollout status deployment/patient-service --timeout=5m
          echo "Pods deployed:"
          kubectl get pods -o wide